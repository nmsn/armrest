<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="128" height="128" rx="22" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>

  <!-- Letter A — centered, bold -->
  <text
    x="54"
    y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="bold"
    fill="url(#aGrad)"
    filter="url(#softglow)"
  >A</text>

  <!-- Large Sparkle star — top right, overlapping A -->
  <!-- Four-pointed sparkle: two thin diamond shapes crossing -->
  <g transform="translate(90, 34)" filter="url(#glow)">
    <!-- Vertical diamond -->
    <path d="M0,-18 C2,-6 2,6 0,18 C-2,6 -2,-6 0,-18 Z" fill="url(#sparkleGrad)"/>
    <!-- Horizontal diamond -->
    <path d="M-18,0 C-6,2 6,2 18,0 C6,-2 -6,-2 -18,0 Z" fill="url(#sparkleGrad)"/>
  </g>

  <!-- Small sparkle — bottom left accent -->
  <g transform="translate(22, 96)" opacity="0.6">
    <path d="M0,-8 C1,-3 1,3 0,8 C-1,3 -1,-3 0,-8 Z" fill="#a78bfa"/>
    <path d="M-8,0 C-3,1 3,1 8,0 C3,-1 -3,-1 -8,0 Z" fill="#a78bfa"/>
  </g>

  <!-- Tiny dot sparkle accent -->
  <circle cx="105" cy="95" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="18" cy="30" r="1.5" fill="#a78bfa" opacity="0.4"/>
</svg>
