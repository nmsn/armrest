name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - '.github/workflows/server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/server/pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile
        working-directory: apps/server

      - name: 配置 D1 Database ID
        run: |
          # 替换 wrangler.toml 中的占位符为真实的 Database ID
          sed -i 's/YOUR_D1_DATABASE_ID/${{ secrets.CLOUDFLARE_DATABASE_ID }}/g' wrangler.toml
          cat wrangler.toml
        working-directory: apps/server

      - name: 运行数据库迁移
        run: |
          npx wrangler d1 migrations apply armrest-db --remote
        working-directory: apps/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 部署到 Cloudflare Workers
        run: pnpm deploy
        working-directory: apps/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_ENV: production
